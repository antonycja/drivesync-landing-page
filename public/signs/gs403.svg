<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- GS403: Lanes Merging Without Reduction. White rect, red border, arrows. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 660" width="600" height="660">
  <!-- White background with red border -->
  <rect x="10" y="10" width="580" height="580" rx="20" fill="#ffffff" stroke="#e20a16" stroke-width="18"/>
  <!-- 3 straight upward arrows (right section) -->
  <!-- Arrow 1 -->
  <rect x="234" y="160" width="44" height="350" fill="#000000"/>
  <polygon points="256,80 196,185 316,185" fill="#000000"/>
  <!-- Arrow 2 -->
  <rect x="340" y="160" width="44" height="350" fill="#000000"/>
  <polygon points="362,80 302,185 422,185" fill="#000000"/>
  <!-- Arrow 3 -->
  <rect x="446" y="160" width="44" height="350" fill="#000000"/>
  <polygon points="468,80 408,185 528,185" fill="#000000"/>
  <!-- Diagonal merging arrow from bottom-left joining leftmost straight arrow -->
  <path d="M 110,530 L 256,210" fill="none" stroke="#000000" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code label -->
  <text x="300" y="630"
        font-family="Arial,Helvetica,sans-serif"
        font-size="36" fill="#555555" text-anchor="middle">GS 403</text>
</svg>
